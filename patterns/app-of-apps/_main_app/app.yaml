# Placeholders that MUST be overridden by an overlay:
# - CLUSTER: the name of the target cluster to which the application should be deployed

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  labels:
    tier: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: in-cluster
    namespace: argocd
  project: PROJECT
  source:
    repoURL: https://github.com/devOwlish/argocd-demo.git
    path: patterns/app-of-apps/clusters
    targetRevision: main
    directory:
      recurse: true
      include: 'kustomization.yaml'
  syncPolicy:
    automated:
      allowEmpty: true
      selfHeal: true
      prune: true
    syncOptions:
    - Validate=true
    - CreateNamespace=true
    - PruneLast=true

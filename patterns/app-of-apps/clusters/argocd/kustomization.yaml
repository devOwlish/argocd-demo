apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: demo-argocd-
resources:
  - ../../base/addons/cert-manager
  - ../../base/addons/ingress-nginx
  - ../../base/addons/external-dns

patches:
  - path: destination.yaml
    target:
      kind: Application
  - path: cert-manager.yaml
    target:
      kind: Application
      name: cert-manager
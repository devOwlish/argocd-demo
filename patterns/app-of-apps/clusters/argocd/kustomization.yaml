apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All app names must be unique across the ArgoCD instance
# So let's prefix the app names with the cluster name (demo-argocd-)
namePrefix: demo-argocd-

resources:
  - ../../base/addons/cert-manager
  - ../../base/addons/ingress-nginx
  - ../../base/addons/reflector

patches:
  # Override .spec.destination.name
  - path: destination.yaml
    target:
      kind: Application
  # App-specific patches
  - path: cert-manager.yaml
    target:
      kind: Application
      name: cert-manager
  - path: reflector.yaml
    target:
      kind: Application
      name: reflector

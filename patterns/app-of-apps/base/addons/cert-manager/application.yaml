# Placeholders that MUST be overridden by an overlay:
# - PROJECT: the name of the ArgoCD project to which the application belongs
# - CLUSTER: the name of the target cluster to which the application should be deployed

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  labels:
    tier: cluster-addons
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: CLUSTER
    namespace: cert-manager
  project: PROJECT
  source:
    repoURL: https://github.com/devOwlish/argocd-demo.git
    path: manifests/cert-manager
    targetRevision: init
  syncPolicy:
    automated:
      allowEmpty: true
      selfHeal: true
    syncOptions:
    - Validate=true
    - CreateNamespace=true
    - PruneLast=true
